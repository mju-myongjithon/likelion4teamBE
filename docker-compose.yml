services:
  app:
    build: .
    # Caddy가 리버스 프록시로 노출하므로 직접 포트 노출 불필요
    env_file:
      - .env
    depends_on:
      - ai-service
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    # app 컨테이너 내부 통신 전용, 외부 노출 불필요
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    # 서버에 likelion4teamBE와 likelion4teamFE가 형제 디렉터리로 clone돼 있다고 가정.
    # 실제 서버 디렉터리 구조가 다르면 이 경로만 맞게 수정하면 된다.
    build: ../likelion4teamFE
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - frontend

volumes:
  caddy_data:
  caddy_config: